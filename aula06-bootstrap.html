<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Aula06 - formulário profissional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  </head>
  <body>
    
    <div class="container container-formulario py-4">
        <!-- cabeçalho visual-->
         <div class="cabeçalho-cadastrado d-flex aling-items-centar gap-3">
            <i class="bi bi-person-vcard-fill fs-1"></i>
         </div>
         <h1 class="fw-bold mb-1 f-3">Cadastro de pessoa</h1>
         <p class="mb-0 opacity-75">
            Preencha os dados abaixo para regitrar um novo contato no sistema.
         </p> 
        </div>
      </div>
    </div>

    <form action="" class="needs-validation" id="formularioCadastro">
      <div class="secao-form">
        <h2 class="titulo-seco"><i class="bi bi-person-badge"></i>Dados Pessoais</h2>
          <div class="row gap-3">
            <div class="col-12 col-md-8">
              <label for="nomeCompleto" class="form-label">Nome completo</label>
            <input type="text" class="form-control" id=" nomeCompleto" name="nomeCompleto" placeholder="Ex:Maria da Silva">
            <div class="invalid-feedback">Informe o noome completo</div>
            </div>

             <div class="col-6 col-md-2">
              <label for="cpf" class="form-label">CPF</label>
            <input type="text" class="form-control" id="cpf"
            name="cpf" placeholder="Ex: 000.000.000-00">
            <div class="invalid-feedback">CPF Inválido.</div>
            </div>

            
          </div>
      </div>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
